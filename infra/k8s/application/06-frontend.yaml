apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: moneta
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        # ── 이미지 교체 시 이 줄만 수정 ──────────────────────────────────────
        # GHCR 사용 예시: ghcr.io/YOUR_GITHUB_ORG/moneta-frontend:latest
        image: ghcr.io/YOUR_GITHUB_ORG/moneta-frontend:latest
        # ───────────────────────────────────────────────────────────────────
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: BACKEND_URL
          value: "http://backend:8000"
        - name: NEXTAUTH_URL
          # ── 실제 도메인으로 교체 ──────────────────────────────────────────
          value: "https://your-domain.com"
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: NEXTAUTH_SECRET
              optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: moneta
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 3000
