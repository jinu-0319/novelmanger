apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: moneta
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: fix-permissions
        image: busybox
        command: ["sh", "-c", "chmod -R 777 /data"]
        volumeMounts:
        - name: data-volume
          mountPath: /data

      containers:
      - name: backend
        # ── 이미지 교체 시 이 줄만 수정 ──────────────────────────────────────
        # GHCR 사용 예시: ghcr.io/YOUR_GITHUB_ORG/moneta-backend:latest
        # ECR  사용 예시: 123456789.dkr.ecr.ap-northeast-2.amazonaws.com/moneta-backend:latest
        image: ghcr.io/YOUR_GITHUB_ORG/moneta-backend:latest
        # ───────────────────────────────────────────────────────────────────
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        volumeMounts:
        - name: data-volume
          mountPath: /app/app/data
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: moneta-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: moneta
spec:
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8000
