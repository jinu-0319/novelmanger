# ⚠️  이 파일은 템플릿입니다. 실제 값을 입력한 뒤 절대 Git에 커밋하지 마세요.
#
# 적용 방법 (kubectl):
#   kubectl create secret generic app-secret \
#     --namespace moneta \
#     --from-literal=GEMINI_API_KEY=your_key \
#     --from-literal=OPENAI_API_KEY=your_key \
#     --from-literal=SERPER_API_KEY=your_key \
#     --from-literal=JWT_SECRET_KEY=your_secret \
#     --from-literal=NEXTAUTH_SECRET=your_nextauth_secret \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# 또는 GitHub Actions에서 자동 생성 (deploy.yml 참고)

apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: moneta
type: Opaque
stringData:
  GEMINI_API_KEY: "REPLACE_ME"
  OPENAI_API_KEY: "REPLACE_ME"
  SERPER_API_KEY: "REPLACE_ME"        # Clio 웹 검색 (선택)
  JWT_SECRET_KEY: "REPLACE_ME"
  NEXTAUTH_SECRET: "REPLACE_ME"       # Next.js 인증 시크릿 (선택)
