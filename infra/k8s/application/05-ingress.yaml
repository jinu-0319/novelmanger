apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moneta-ingress
  namespace: moneta
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"   # 파일 업로드 한도 50MB
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120" # AI 분석 응답 대기 (SSE 포함)
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    # ── 도메인을 실제 주소로 교체하세요 ─────────────────────────────────────
  - host: your-domain.com
    http:
      paths:
        # ── 백엔드 API 경로 ─────────────────────────────────────────────────
        - path: /health
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /auth
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /novels
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /story
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /review
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /wiki
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /plot
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /spell
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /manuscript
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /history
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /export
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /docs
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        - path: /openapi.json
          pathType: Prefix
          backend:
            service:
              name: backend
              port:
                number: 8000

        # ── 프론트엔드 (나머지 모든 경로) ────────────────────────────────────
        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend
              port:
                number: 80
